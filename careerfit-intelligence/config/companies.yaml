companies:
  # Default demo source. The connector can auto-detect Workday from this URL.
  - name: NVIDIA
    active: true
    careers_url: https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite
    ats:
      type: auto
      search_text: intern
      us_only: true
      include_remote: true
      include_unknown_locations: false
    monitors:
      new_roles: true

