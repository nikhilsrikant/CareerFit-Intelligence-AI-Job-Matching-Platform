  # — Big tech that uses supported ATS —
  - name: Microsoft
    active: true
    careers_url: https://apply.careers.microsoft.com
    ats: { type: auto, search_text: intern, us_only: true, include_remote: true, include_unknown_locations: false }
    monitors: { new_roles: true }

