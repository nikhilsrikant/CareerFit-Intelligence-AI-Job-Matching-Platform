# ════════════════════════════════════════════════════════════════════
#  CareerFit company sources
#
#  Connector support: Workday, Greenhouse, Ashby, Lever, SmartRecruiters,
#  Amazon (amazon.jobs), Microsoft (apply.careers.microsoft.com).
#
#  Anything on Oracle Cloud HCM, Eightfold, Phenom People, iCIMS,
#  Appcast, or proprietary careers portals will fall back to a generic
#  scraper that almost always returns zero jobs (or gets 403/404 blocked).
#  Those are kept for transparency but marked `active: false`.
# ════════════════════════════════════════════════════════════════════

companies:
